<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reachy Mini — Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/dashboard.css" />
  </head>
  <body>
    <div class="ambient"></div>
    <div class="container dash-container">
      <header class="hero dash-hero">
        <h1>Reachy Mini</h1>
        <p class="subtitle" id="uptime">Dashboard</p>
      </header>

      <nav class="tab-bar">
        <button class="tab active" data-tab="status">Status</button>
        <button class="tab" data-tab="controls">Controls</button>
        <button class="tab" data-tab="logs">Logs</button>
        <button class="tab" data-tab="settings">Settings</button>
        <button class="tab" data-tab="config">Config</button>
      </nav>

      <!-- ====== STATUS TAB ====== -->
      <section id="tab-status" class="tab-content active">
        <div class="status-grid">
          <div class="stat-card">
            <span class="stat-label">Provider</span>
            <span class="stat-value" id="s-provider">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Model</span>
            <span class="stat-value stat-value-sm" id="s-model">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Multimodal</span>
            <span class="stat-value" id="s-multimodal">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Camera</span>
            <span class="stat-value" id="s-camera">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Listening</span>
            <span class="stat-value" id="s-listening">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Breathing</span>
            <span class="stat-value" id="s-breathing">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Move Queue</span>
            <span class="stat-value" id="s-queue">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Loop Hz</span>
            <span class="stat-value" id="s-hz">—</span>
          </div>
        </div>
      </section>

      <!-- ====== CONTROLS TAB ====== -->
      <section id="tab-controls" class="tab-content">
        <div class="ctrl-section">
          <h3>Listen</h3>
          <div class="ctrl-row">
            <button class="ctrl-btn ctrl-listen" data-listen="true">Start Listening</button>
            <button class="ctrl-btn ctrl-listen" data-listen="false">Stop Listening</button>
          </div>
        </div>

        <div class="ctrl-section">
          <h3>Head</h3>
          <div class="head-grid">
            <div></div>
            <button class="ctrl-btn" data-move="head" data-name="up">Up</button>
            <div></div>
            <button class="ctrl-btn" data-move="head" data-name="left">Left</button>
            <button class="ctrl-btn" data-move="head" data-name="front">Front</button>
            <button class="ctrl-btn" data-move="head" data-name="right">Right</button>
            <div></div>
            <button class="ctrl-btn" data-move="head" data-name="down">Down</button>
            <div></div>
          </div>
        </div>

        <div class="ctrl-section">
          <h3>Emotions</h3>
          <div class="btn-grid" id="emotion-buttons">
            <button class="ctrl-btn" data-move="emotion" data-name="happy">Happy</button>
            <button class="ctrl-btn" data-move="emotion" data-name="sad">Sad</button>
            <button class="ctrl-btn" data-move="emotion" data-name="confused">Confused</button>
            <button class="ctrl-btn" data-move="emotion" data-name="surprised">Surprised</button>
            <button class="ctrl-btn" data-move="emotion" data-name="angry">Angry</button>
            <button class="ctrl-btn" data-move="emotion" data-name="tired">Tired</button>
          </div>
        </div>

        <div class="ctrl-section">
          <h3>Dances</h3>
          <div class="btn-grid" id="dance-buttons">
            <button class="ctrl-btn" data-move="dance" data-name="simple_nod">Nod</button>
            <button class="ctrl-btn" data-move="dance" data-name="head_tilt_roll">Tilt Roll</button>
            <button class="ctrl-btn" data-move="dance" data-name="side_to_side_sway">Sway</button>
            <button class="ctrl-btn" data-move="dance" data-name="dizzy_spin">Dizzy</button>
            <button class="ctrl-btn" data-move="dance" data-name="stumble_and_recover">Stumble</button>
            <button class="ctrl-btn" data-move="dance" data-name="interwoven_spirals">Spirals</button>
            <button class="ctrl-btn" data-move="dance" data-name="side_peekaboo">Peekaboo</button>
          </div>
        </div>
        <p id="ctrl-status" class="status"></p>
      </section>

      <!-- ====== LOGS TAB ====== -->
      <section id="tab-logs" class="tab-content">
        <div class="log-toolbar">
          <select id="log-level-filter">
            <option value="ALL">All levels</option>
            <option value="DEBUG">DEBUG</option>
            <option value="INFO" selected>INFO+</option>
            <option value="WARNING">WARNING+</option>
            <option value="ERROR">ERROR+</option>
          </select>
          <label class="log-toggle">
            <input type="checkbox" id="log-autoscroll" checked />
            Auto-scroll
          </label>
          <button id="log-clear" class="ghost">Clear</button>
        </div>
        <div id="log-container" class="log-container"></div>
      </section>

      <!-- ====== SETTINGS TAB ====== -->
      <section id="tab-settings" class="tab-content">
        <iframe id="settings-frame" src="/static/index.html" class="settings-iframe"></iframe>
      </section>

      <!-- ====== CONFIG TAB ====== -->
      <section id="tab-config" class="tab-content">
        <div class="panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Runtime</p>
              <h2>Configuration</h2>
            </div>
            <span class="chip">Read-only</span>
          </div>
          <div id="config-table" class="config-table"></div>
        </div>
      </section>
    </div>

    <script src="/static/dashboard.js"></script>
  </body>
</html>
